<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="app-container">
        <div class="window-controls">
            <button class="mini-btn" id="toggle-mini" title="Mini Mode">🗗</button>
            <button class="mini-btn" id="close-app" title="Close">✕</button>
        </div>

        <div class="track-info" id="track-section">
            <div id="visualizer-container" class="visualizer"></div>
            <img id="thumbnail" src="" alt="" style="display: none;">
            <div class="text-group">
                <div class="title-wrapper">
                    <span id="title">Scanning...</span>
                </div>
                <span id="artist">Waiting for Music</span>
            </div>
        </div>

        <div class="controls">
            <button id="prev" class="btn">
                <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
            </button>
            <button id="play" class="btn">
                <svg id="play-svg" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button id="next" class="btn">
                <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
            <button id="shuffle" class="btn" title="Shuffle">
                <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.44 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
            </button>
            <button id="show-tabs" class="btn" title="Media Tabs">
                <svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
                <span id="tab-count" class="badge">0</span>
            </button>
        </div>

        <!-- Sliding Tabs Panel -->
        <div id="tabs-panel" class="tabs-panel">
            <div class="tabs-header">
                <span>Active Sessions</span>
                <button id="close-tabs">✕</button>
            </div>
            <div id="tabs-list" class="tabs-list">
                <!-- Tabs will be injected here -->
            </div>
        </div>

        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
