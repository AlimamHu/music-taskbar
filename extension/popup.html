<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            width: 200px;
            padding: 15px;
            background: #121212;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }
        .header {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #00ff00;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }
        .option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .option span {
            font-size: 12px;
        }
        /* Switch styling */
        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 20px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 20px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #00ff00;
        }
        input:checked + .slider:before {
            transform: translateX(14px);
        }
    </style>
</head>
<body>
    <div class="header">Taskbar Settings</div>
    
    <div class="option">
        <span>Dynamic Theming</span>
        <label class="switch">
            <input type="checkbox" id="dynamicTheming" checked>
            <span class="slider"></span>
        </label>
    </div>

    <div class="option">
        <span>Audio Visualizer</span>
        <label class="switch">
            <input type="checkbox" id="visualizer" checked>
            <span class="slider"></span>
        </label>
    </div>

    <div class="option">
        <span>Scrolling Title</span>
        <label class="switch">
            <input type="checkbox" id="scrollingTitle" checked>
            <span class="slider"></span>
        </label>
    </div>

    <script src="popup.js"></script>
</body>
</html>
